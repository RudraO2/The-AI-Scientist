services:
  - type: web
    name: ai-scientist-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LOG_LEVEL
        value: INFO
      - key: ENABLE_GROUNDED_PURCHASE_URLS
        value: "1"
      # Set in Render dashboard (do NOT commit values).
      - key: GEMINI_API_KEY
        sync: false
      - key: HYDRADB_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GEMINI_MODEL
        sync: false
